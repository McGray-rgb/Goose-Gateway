<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goose Gateway</title>
  <meta name="description" content="Your premium gaming hub.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Background Image with Overlay -->
  <div class="background-container">
    <div id="bg-image" class="bg-image"></div>
    <div class="overlay"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span>GOOSE GATEWAY</span>
    </div>

    <div class="nav-icons">
      <svg class="icon search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <svg class="icon user-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    <div class="hero-content">
      <div class="hero-text">
        <h3 id="subtitle">Action / RPG</h3>
        <h1 id="main-title">ASSASSIN'S CREED<br>MIRAGE</h1>
        <p id="description">In Assassin's Creed® Mirage, you are Basim, a cunning street thief with nightmarish visions seeking answers and justice.</p>
        <div class="cta-wrapper">
          <button class="icon-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </button>
          <a href="#" id="buy-now-btn" target="_blank" class="buy-btn">BUY NOW ON STEAM &nbsp;&boxur;</a>
        </div>
      </div>
    </div>

    <!-- Right Side Carousel -->
    <div class="carousel-container">
      <div class="cards-track" id="cards-track">
        <!-- Cards will be injected by JavaScript -->
      </div>
      
      <div class="carousel-controls">
        <div class="arrows">
          <button id="prev-btn" class="arrow-btn"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
          <button id="next-btn" class="arrow-btn"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
        <div class="slide-indicator" id="slide-indicator">01</div>
      </div>
    </div>
  </main>
  
  <script src="script.js"></script>
</body>
</html>
